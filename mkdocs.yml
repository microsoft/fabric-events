site_name: Fabric Events
site_description: Practical resources for building event-driven solutions with Microsoft Fabric
site_url: https://microsoft.github.io/fabric-events/
repo_url: https://github.com/microsoft/fabric-events
repo_name: microsoft/fabric-events
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/microsoft/fabric-events/discussions
      name: Join the discussion on GitHub

copyright: 'Built with <span class="heart">&#10084;</span> by the Fabric Events team'

extra_css:
  - stylesheets/extra.css

plugins:
  - search

nav:
  - Home: home/index.md
  - Business Events:
    - Introduction:
      - What are Business Events?: business-events/introduction/what-are-business-events.md
      - Architecture Overview: business-events/introduction/architecture-overview.md
      - Event Schema: business-events/introduction/event-schema.md
    - Design Guides:
      - Overview: business-events/design-guides/index.md
      - Event-Driven Architectures: business-events/design-guides/event-driven-architectures.md
      - Decision Guide: business-events/introduction/decision-guide.md
      - Structuring Payloads: business-events/design-guides/structuring-payloads.md
      - Handling Retries: business-events/design-guides/handling-retries.md
      - Schema Versioning: business-events/design-guides/schema-versioning.md
      - Multi-Consumer Fanout: business-events/design-guides/multi-consumer-fanout.md
    - Recipes:
      - Overview: business-events/recipes/index.md
      - Chain Two Business Events: business-events/recipes/chain-two-business-events.md
      - Batch Publish from a Notebook: business-events/recipes/batch-publish-notebook.md
      - Batch Publish from a User Data Function: business-events/recipes/batch-publish-udf.md
    - Scenarios:
      - Overview: business-events/scenarios/index.md
      - Detect & Alert:
        - Sales Volume Alert: business-events/scenarios/sales-volume-alert.md
        - Real-Time Stream Alert: business-events/scenarios/real-time-stream-alert.md
      - Decide & Act:
        - Business Automation Loop: business-events/scenarios/business-automation-loop.md
        - Abandoned Cart Recovery: business-events/scenarios/abandoned-cart-recovery.md
        - Fraud Response Before Fulfillment: business-events/scenarios/fraud-response-before-fulfillment.md
        - Real-Time Viewer Recommendations: business-events/scenarios/real-time-viewer-recommendations.md
        - Shipment Delay Auto-Mitigation: business-events/scenarios/shipment-delay-auto-mitigation.md
      - Track & Analyze:
        - Low Stock Threshold: business-events/scenarios/low-stock-threshold.md
        - Data Lineage Audit: business-events/scenarios/data-lineage-audit.md
  - Fabric Events: fabric-events/index.md
  - Azure Events: azure-events/index.md
